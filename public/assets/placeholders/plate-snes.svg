<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges" style="image-rendering:pixelated">
  <!-- SNES-style plate with pasta: 16x16 pixel art -->

  <!-- Plate rim (outer ring) -->
  <rect x="2" y="0" width="12" height="1" fill="#D8D0C0"/>
  <rect x="1" y="1" width="14" height="1" fill="#D8D0C0"/>
  <rect x="0" y="2" width="16" height="1" fill="#E8E0D0"/>
  <rect x="0" y="3" width="16" height="1" fill="#E8E0D0"/>
  <rect x="0" y="12" width="16" height="1" fill="#E8E0D0"/>
  <rect x="0" y="13" width="16" height="1" fill="#E8E0D0"/>
  <rect x="1" y="14" width="14" height="1" fill="#D8D0C0"/>
  <rect x="2" y="15" width="12" height="1" fill="#D8D0C0"/>

  <!-- Plate sides -->
  <rect x="0" y="4" width="1" height="8" fill="#E8E0D0"/>
  <rect x="15" y="4" width="1" height="8" fill="#E8E0D0"/>
  <rect x="1" y="4" width="1" height="8" fill="#F8F2E8"/>
  <rect x="14" y="4" width="1" height="8" fill="#F8F2E8"/>

  <!-- Plate interior (cream/ivory) -->
  <rect x="2" y="4" width="12" height="8" fill="#FBF6EE"/>

  <!-- Plate rim shadow (inner edge) -->
  <rect x="2" y="4" width="12" height="1" fill="#EAE2D0"/>
  <rect x="2" y="11" width="12" height="1" fill="#EAE2D0"/>

  <!-- Pasta / food: spaghetti swirl in warm orange-red -->
  <rect x="5" y="5" width="6" height="1" fill="#C85020"/>
  <rect x="4" y="6" width="2" height="1" fill="#C85020"/>
  <rect x="8" y="6" width="3" height="1" fill="#C85020"/>
  <rect x="6" y="6" width="2" height="1" fill="#E8901A"/>
  <rect x="4" y="7" width="3" height="1" fill="#E8901A"/>
  <rect x="9" y="7" width="2" height="1" fill="#C85020"/>
  <rect x="5" y="8" width="6" height="1" fill="#C85020"/>
  <rect x="6" y="9" width="4" height="1" fill="#E8901A"/>

  <!-- Plate rim gold accent -->
  <rect x="3" y="1" width="10" height="1" fill="#C8A030"/>
  <rect x="2" y="14" width="12" height="1" fill="#C8A030"/>
</svg>
